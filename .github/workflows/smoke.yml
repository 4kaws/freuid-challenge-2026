name: docker-smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['docker/**', 'prepare_submission.py', '.github/workflows/smoke.yml']

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build image
        run: docker build -f docker/Dockerfile -t freuid-solution .

      - name: Generate synthetic test images
        run: |
          mkdir -p /tmp/data /tmp/out && chmod 777 /tmp/out
          python3 - <<'EOF'
          import struct, zlib, os, random
          def png(path, w, h):
              raw = b''.join(b'\x00' + bytes(random.getrandbits(8) for _ in range(w*3)) for _ in range(h))
              def chunk(t, d):
                  c = t + d
                  return struct.pack('>I', len(d)) + c + struct.pack('>I', zlib.crc32(c))
              hdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              open(path, 'wb').write(b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', hdr)
                  + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b''))
          random.seed(0)
          for i in range(6):
              png(f'/tmp/data/testimg{i:02d}.png', 700, 900)
          EOF
          ls -la /tmp/data

      - name: Run container (no network, CPU) for both variants
        run: |
          for V in ens2 hedge; do
            rm -f /tmp/out/submission.csv
            docker run --rm --network none \
              -e VARIANT=$V \
              -v /tmp/data:/data:ro \
              -v /tmp/out:/submissions \
              freuid-solution
            python3 - <<EOF
          import csv
          rows = list(csv.reader(open('/tmp/out/submission.csv')))
          assert rows[0] == ['id', 'label'], rows[0]
          assert len(rows) == 7, len(rows)
          ids = {r[0] for r in rows[1:]}
          assert ids == {f'testimg{i:02d}' for i in range(6)}, ids
          for r in rows[1:]:
              v = float(r[1]); assert 0.0 <= v <= 1.0
          print('VARIANT=$V OK:', rows[1:3])
          EOF
          done
